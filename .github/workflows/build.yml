name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build

  linux:
    name: Linux converter + AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make curl unzip ffmpeg

      - name: Install Node dependencies
        run: npm install

      - name: Install Python converter (with dev extras)
        run: pip install -e ".[dev]"

      - name: Build/fetch native Linux converter tools
        run: bash tools/build-linux-tools.sh

      - name: Package converter (PyInstaller)
        run: npm run converter:pack

      - name: Package Linux app (AppImage)
        run: npm run electron:pack:linux

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: FeedForge-linux-AppImage
          path: release/*.AppImage
          if-no-files-found: error
